<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g stroke="#1f2937" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Shield mark -->
  <g transform="translate(68, 52)">
    <!-- Shield outer -->
    <path d="M32 0 L64 10 L64 36 Q64 58 32 68 Q0 58 0 36 L0 10 Z"
      fill="url(#shield-grad)" opacity="0.9"/>
    <!-- Shield inner pulse line -->
    <polyline points="12,34 20,26 28,38 36,22 44,30 52,34"
      fill="none" stroke="#a5b4fc" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>

  <!-- TrustM365 wordmark -->
  <text x="156" y="98" font-family="'Segoe UI', system-ui, sans-serif"
    font-size="42" font-weight="700" fill="white" letter-spacing="-1">
    Trust<tspan fill="#818cf8">M365</tspan>
  </text>

  <!-- Tagline -->
  <text x="158" y="128" font-family="'Segoe UI', system-ui, sans-serif"
    font-size="16" fill="#6b7280" letter-spacing="0.5">
    Monitor. Baseline. Restore.
  </text>

  <!-- Right side feature pills -->
  <g transform="translate(490, 62)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="130" height="26" rx="13" fill="#1f2937" stroke="#374151"/>
    <circle cx="16" cy="13" r="5" fill="#22c55e"/>
    <text x="28" y="18" font-family="'Segoe UI', system-ui, sans-serif"
      font-size="12" fill="#d1d5db">Drift Detection</text>

    <!-- Pill 2 -->
    <rect x="0" y="34" width="130" height="26" rx="13" fill="#1f2937" stroke="#374151"/>
    <circle cx="16" cy="47" r="5" fill="#818cf8"/>
    <text x="28" y="52" font-family="'Segoe UI', system-ui, sans-serif"
      font-size="12" fill="#d1d5db">One-Click Restore</text>

    <!-- Pill 3 -->
    <rect x="0" y="68" width="130" height="26" rx="13" fill="#1f2937" stroke="#374151"/>
    <circle cx="16" cy="81" r="5" fill="#f59e0b"/>
    <text x="28" y="86" font-family="'Segoe UI', system-ui, sans-serif"
      font-size="12" fill="#d1d5db">MSSP Portfolio</text>

    <!-- Pill 4 -->
    <rect x="0" y="102" width="130" height="26" rx="13" fill="#1f2937" stroke="#374151"/>
    <circle cx="16" cy="115" r="5" fill="#38bdf8"/>
    <text x="28" y="120" font-family="'Segoe UI', system-ui, sans-serif"
      font-size="12" fill="#d1d5db">Audit Reports</text>
  </g>

  <!-- Border accent -->
  <rect x="1" y="1" width="798" height="198" fill="none" stroke="#374151" stroke-width="1" rx="12"/>
  <rect x="0" y="0" width="4" height="200" fill="#6366f1" rx="2"/>
</svg>
